<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&icon_names=delete"
    />
    <title>ToDo_List</title>
  </head>
  <body>
    <div class="maincontainer">
      <div class="leftSec">
        <div class="leftTop">
          <h2 id="topHeading">Todo List</h2>
          <div class="category">
            <!-- <h2 id="categoryHeading">Category</h2> -->
            <button class="completedBtn" onclick="showTask('completedTask')">
              Compeleted
            </button>

            <button class="priorityBtn" onclick="showTask('priorityTask')">
              Priority
            </button>

            <button class="pendingBtn" onclick="showTask('pendingTask')">
              Pending
            </button>
          </div>
        </div>
        <div class="leftBottom">
          <h2 id="bottomHeading">Task's</h2>
          <ul id="displayList"></ul>
        </div>
      </div>

      <div class="rightSec">
        <div class="bgsection">fgwegwe
        <div class="topsection">
          <h2 id="date_time"></h2>
          <h1 id="greetingMsg"></h1>
        </div>
        <div class="bottomsection">
          <p id="heading">Just Do It.</p>
          <div class="getTask">
            <div class="inputTask">
              <input
                type="text"
                placeholder="What's on your mind?"
                id="addTask"
              />
              <button id="addTaskBtn">Add Task</button>
            </div>

            <div class="displaytask">
              <div class="additem">
                <ul id="ul_TaskList"></ul>
              </div>
            </div>
          </div>
        </div> </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
