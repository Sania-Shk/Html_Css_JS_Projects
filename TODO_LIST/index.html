<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>ToDo_List</title>
  </head>
  <body>
    <div class="maincontainer">
      <div class="leftSec">
        <div class="leftTop">
          <h2>Todo List</h2>
          <div class="category">
            category
            <button class="completedBtn" onclick="showTask('completedTask')">
              Compeleted
            </button>

            <button class="priorityBtn" onclick="showTask('priorityTask')">
              Priority
            </button>

            <button class="pendingBtn" onclick="showTask('pendingTask')">
              Pending
            </button>
          </div>
        </div>
        <div class="leftBottom">
          left bottom section
          <ul id="displayList"></ul>
        </div>
      </div>

      <div class="rightSec">
        <div class="topsection">
          <h2>march 29</h2>
          <h1>Good Afteroon!</h1>
        </div>
        <div class="bottomsection">
          <p>Just Do It!</p>
          <div class="addtask">
            <input
              type="text"
              placeholder="What's on your mind?"
              id="addTask"
            />
            <button id="addTaskBtn">Add Task</button>
          </div>

          <div class="displaytask">
            <div class="additem">
              <ul id="ul_TaskList"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
